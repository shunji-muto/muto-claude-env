name: muto-claude-env
version: 1.0.0
description: APM project for muto-claude-env
author: shunji.muto
# Which agent platforms to deploy to.
# Resolution order: --target flag > this field > auto-detect from filesystem.
# Accepted values: agent-skills, antigravity, claude, codex, copilot, cursor, gemini, kiro, opencode, windsurf
targets:
- claude
dependencies:
  apm: []
  # MCP サーバー依存（トークンは書かない。${ENV_VAR} は install 先マシンの環境変数を参照）
  # 必要な環境変数は README の「MCP セットアップ」参照
  mcp:
    - name: context7
      registry: false
      transport: stdio
      command: bunx
      args: ["-y", "@upstash/context7-mcp", "--api-key", "${CONTEXT7_API_KEY}"]
# NOTE: .apm/skills/my-* は Anthropic built-in の書き起こし（private 利用限定・gitignore 済）。
# includes: auto は gitignore を無視して pack する（実測 2026-07-22）ため使えない。
# 配布したいものだけ明示リスト化する。
includes:
  - .apm/agents/
  - .apm/skills/smart-commit/
  - .apm/skills/branch/
  - .apm/skills/merge/
  - .apm/skills/senior-pr-review/
  - .apm/skills/compact-prompt/
  - .apm/skills/visual-qa/
  - .apm/skills/ui-tips/
  - .apm/skills/grill-me/
  - .apm/skills/create-routine-issue/
  - bin/
  - routines/
license: UNLICENSED
scripts: {}
